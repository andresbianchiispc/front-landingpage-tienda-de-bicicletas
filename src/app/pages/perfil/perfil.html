<div class="perfil-wrapper">
  <section class="perfil-hero">
    <div>
      <p class="eyebrow">Acceso</p>
      <h1>Entrá para publicar o administrar el catálogo</h1>
      <p class="hero-copy">Usá tu usuario o tu mail. Si sos admin vas al panel de control; si sos cliente vas directo a publicar.</p>
    </div>
  </section>

  <section class="perfil-card perfil-card-form">
    <div class="card-header">
      <div>
        <h2>Iniciar sesión</h2>
        <p class="texto-secundario">Completá tus credenciales para acceder a tu flujo correspondiente.</p>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-grupo">
        <label>Usuario o mail</label>
        <input type="text" [(ngModel)]="usuarioLogin" placeholder="cliente@correo.com" />
      </div>

      <div class="form-grupo">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="passwordLogin" placeholder="Tu contraseña" />
      </div>
    </div>

    @if (errorLogin) {
      <p class="mensaje-estado mensaje-error">{{ errorLogin }}</p>
    }

    <div class="acciones-formulario">
      <button class="btn-base btn-primario" (click)="iniciarSesion()">Iniciar sesión</button>
    </div>
  </section>
</div>
