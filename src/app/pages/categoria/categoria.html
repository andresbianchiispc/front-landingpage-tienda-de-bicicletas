<div class="container-fluido">
    <div class="productos-container">
        @for (prod of productos; track prod.id) {
        <div class="producto-card" [routerLink]="['/articulo', prod.id]">
            <div class="carousel-wrapper" #tarjeta>
                @if (prod.precio > 200000) {
                  <span class="card-label label-blue">CARBON T800</span>
                } @else {
                  <span class="card-label label-orange">LIMITED EDITION</span>
                }
                <button class="btn-carousel prev" (click)="scrollGaleria(tarjeta, -1, $event)">❮</button>
                <button class="btn-carousel next" (click)="scrollGaleria(tarjeta, 1, $event)">❯</button>
                <div class="carousel-track">
                    <img [src]="prod.fotoUrl" class="producto-img" [alt]="prod.nombre">
                    <img [src]="prod.fotoUrl" class="producto-img flipped" [alt]="prod.nombre">
                    <img [src]="prod.fotoUrl" class="producto-img detail" [alt]="prod.nombre">
                </div>
            </div>

            @if (productoEditandoId === prod.id) {
            <div class="admin-editor" (click)="$event.stopPropagation()">
                <div class="form-grupo">
                    <label>Nombre</label>
                    <input type="text" [(ngModel)]="nombreEdicion">
                </div>
                <div class="form-grupo">
                    <label>Precio</label>
                    <input type="number" [(ngModel)]="precioEdicion">
                </div>
                <div class="form-grupo">
                    <label>Foto</label>
                    <input type="url" [(ngModel)]="fotoEdicion">
                </div>
                <div class="form-grupo">
                    <label>Especificaciones</label>
                    <textarea rows="3" [(ngModel)]="specsEdicion"></textarea>
                </div>
                <div class="acciones-editor">
                    <button class="btn-editar-admin" (click)="guardarEdicion(prod)">Guardar</button>
                    <button class="btn-cancelar-admin" (click)="cancelarEdicion()">Cancelar</button>
                </div>
            </div>
            } @else {
            <div class="info-body">
                <div class="info-content">
                    <h4>{{ prod.nombre }}</h4>
                    <p class="precio">${{ prod.precio | number:'1.0-0' }}</p>
                </div>
            </div>

            @if (esAdmin) {
            <div class="acciones-card" (click)="$event.stopPropagation()">
                <div class="acciones-admin-card">
                    <button class="btn-editar-admin" (click)="iniciarEdicion(prod)">Editar</button>
                    <button class="btn-cancelar-admin" (click)="ocultarProducto(prod)">Eliminar</button>
                </div>
            </div>
            }
            }
        </div>
        }
    </div>
</div>
